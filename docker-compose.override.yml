# Development overrides — hot reload with mounted source
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up

version: "3.9"

services:
  comply-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ["npm", "run", "dev", "--workspace=packages/web"]
    volumes:
      - ./packages/web/src:/app/packages/web/src
      - ./packages/core/src:/app/packages/core/src
    environment:
      - NODE_ENV=development
    ports:
      - "3300:3000"

  comply-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ["node", "--watch", "packages/web/worker.js"]
    volumes:
      - ./packages/web/src:/app/packages/web/src
      - ./packages/core/src:/app/packages/core/src
    environment:
      - NODE_ENV=development
